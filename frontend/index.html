<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Email Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Azure Email Demo</h1>
            <p class="subtitle">Send emails using Azure Communication Services</p>
        </header>

        <form id="emailForm" novalidate>
            <div class="form-group">
                <label for="recipient">Recipient Email</label>
                <input
                    type="email"
                    id="recipient"
                    name="email"
                    placeholder="recipient@example.com"
                    required
                    autocomplete="email"
                />
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Enter email subject"
                    required
                />
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="Type your message here..."
                    rows="6"
                    required
                ></textarea>
            </div>

            <button type="submit" id="sendBtn">Send Email</button>
        </form>

        <!-- Status message area -->
        <div id="status" class="status hidden" role="alert" aria-live="polite"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
